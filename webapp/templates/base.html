<!DOCTYPE html>
<html lang="en">

    <link rel="stylesheet" href="{{ url_for('static', path='/dashboard.css') }}">
</head>
<body>

        <header class="site-header">

                <span class="brand-mark">Y</span>
                <div>
                    <p class="eyebrow">Yutafraud</p>

            </nav>
        </header>
        {% block content %}{% endblock %}

</html>
